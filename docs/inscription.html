<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    safelist: ['text-ef-accent', 'opacity-100', 'border-ef-error', '!border-ef-error'],
    theme: {
      extend: {
        colors: {
          ef: {
            bg:             '#2d353b',
            card:           '#343f44',
            input:          '#3d484d',
            hover:          '#475258',
            border:         '#475258',
            fg:             '#d3c6aa',
            dim:            '#9da9a0',
            faint:          '#7a8478',
            accent:         '#a7c080',
            'accent-hover': '#8fad6f',
            error:          '#e67e80',
          }
        },
        fontFamily: {
          display: ['"Space Grotesk"', 'sans-serif'],
          body:    ['"Inter"', 'sans-serif'],
          mono:    ['"JetBrains Mono"', 'monospace'],
        }
      }
    }
  }
</script>
</head>
<body class="bg-ef-bg text-ef-fg font-body min-h-screen flex flex-col items-center justify-start px-3 pt-6 pb-14 sm:justify-center sm:px-4 sm:pt-10 lg:pt-16">

  <div class="w-full max-w-sm sm:max-w-md">

    <!-- En-tête -->
    <div class="mb-5 px-1 sm:mb-6">
      <div class="flex items-center gap-2 mb-2 font-mono text-[11.5px] uppercase tracking-[0.08em] text-ef-faint">
        <span class="w-1.5 h-1.5 rounded-full bg-ef-accent shrink-0"></span>
        Accès · Inscription
      </div>
      <h1 class="font-display text-[22px] sm:text-2xl font-semibold tracking-tight text-ef-fg mb-1.5">
        Créer un accès
      </h1>
      <p class="text-[13.5px] text-ef-dim leading-relaxed">
        Votre adresse électronique restera confidentielle et ne sera jamais partagée.
      </p>
    </div>

    <!-- Carte -->
    <div class="bg-ef-card border border-ef-border rounded-2xl p-5 sm:p-7 shadow-[0_1px_2px_rgba(0,0,0,0.2),0_4px_16px_rgba(0,0,0,0.24)]">
      <form id="signupForm" novalidate>

        <!-- Adresse électronique -->
        <div class="mb-5">
          <label for="electronicAddress" class="block text-[12.5px] font-semibold text-ef-fg mb-2">
            Adresse électronique
          </label>
          <input
            type="email"
            id="electronicAddress"
            class="w-full bg-ef-input border-[1.5px] border-ef-border rounded-lg px-3.5 py-3 text-ef-fg text-[15px] placeholder-ef-faint outline-none transition-colors duration-150 focus:border-ef-accent focus:bg-ef-card"
            placeholder="vous@example.com"
            autocomplete="email"
            inputmode="email"
          >
          <p id="emailError" class="hidden mt-2 text-[12px] text-ef-error flex items-center gap-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Format d'adresse électronique invalide.
          </p>
        </div>

        <!-- Secret -->
        <div>
          <label for="secret" class="block text-[12.5px] font-semibold text-ef-fg mb-2">
            Secret
          </label>
          <div class="relative flex items-center">
            <input
              type="password"
              id="secret"
              class="w-full bg-ef-input border-[1.5px] border-ef-border rounded-lg px-3.5 py-3 pr-11 text-ef-fg text-[15px] placeholder-ef-faint outline-none transition-colors duration-150 focus:border-ef-accent focus:bg-ef-card"
              placeholder="Votre secret…"
              autocomplete="new-password"
            >
            <button
              type="button"
              id="toggleSecret"
              aria-label="Afficher le secret"
              class="absolute right-3 text-ef-faint hover:text-ef-fg transition-colors duration-150 rounded p-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-ef-accent focus-visible:outline-offset-2"
            >
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>

          <!-- Critères du secret -->
          <div class="grid grid-cols-2 gap-x-3 gap-y-2 mt-3">
            <div id="c-length"  class="criterion flex items-center gap-1.5 text-[12px] text-ef-faint transition-colors duration-200">
              <span class="w-4 h-4 rounded-full border border-current shrink-0 flex items-center justify-center transition-colors duration-200">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 transition-opacity duration-150"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              20 à 60 caractères
            </div>
            <div id="c-lower"   class="criterion flex items-center gap-1.5 text-[12px] text-ef-faint transition-colors duration-200">
              <span class="w-4 h-4 rounded-full border border-current shrink-0 flex items-center justify-center transition-colors duration-200">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 transition-opacity duration-150"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              Minuscule
            </div>
            <div id="c-upper"   class="criterion flex items-center gap-1.5 text-[12px] text-ef-faint transition-colors duration-200">
              <span class="w-4 h-4 rounded-full border border-current shrink-0 flex items-center justify-center transition-colors duration-200">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 transition-opacity duration-150"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              Majuscule
            </div>
            <div id="c-digit"   class="criterion flex items-center gap-1.5 text-[12px] text-ef-faint transition-colors duration-200">
              <span class="w-4 h-4 rounded-full border border-current shrink-0 flex items-center justify-center transition-colors duration-200">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 transition-opacity duration-150"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              Chiffre
            </div>
            <div id="c-special" class="criterion flex items-center gap-1.5 text-[12px] text-ef-faint transition-colors duration-200">
              <span class="w-4 h-4 rounded-full border border-current shrink-0 flex items-center justify-center transition-colors duration-200">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 transition-opacity duration-150"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
              Caractère spécial
            </div>
          </div>
        </div>

        <hr class="border-ef-border my-6">

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="w-full bg-ef-accent text-ef-bg font-semibold text-[14.5px] rounded-lg py-3.5 flex items-center justify-center gap-2 transition-all duration-150 hover:bg-ef-accent-hover active:scale-[0.99] disabled:bg-ef-hover disabled:text-ef-faint disabled:cursor-not-allowed"
        >
          Créer l'accès
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

      </form>
    </div>

    <p class="mt-5 text-center text-[13px] text-ef-faint">
      Déjà un accès ? <a href="#" class="text-ef-accent font-medium hover:underline">Se connecter</a>
    </p>

  </div>

<script>
  const emailInput  = document.getElementById('electronicAddress');
  const secretInput = document.getElementById('secret');
  const submitBtn   = document.getElementById('submitBtn');
  const emailError  = document.getElementById('emailError');
  const toggleBtn   = document.getElementById('toggleSecret');

  const criteria = {
    length:  { el: document.getElementById('c-length'),  test: v => v.length >= 20 && v.length <= 60 },
    lower:   { el: document.getElementById('c-lower'),   test: v => /[a-z]/.test(v) },
    upper:   { el: document.getElementById('c-upper'),   test: v => /[A-Z]/.test(v) },
    digit:   { el: document.getElementById('c-digit'),   test: v => /\d/.test(v) },
    special: { el: document.getElementById('c-special'), test: v => /[^a-zA-Z0-9]/.test(v) },
  };

  function validateEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  }

  function updateState() {
    const secret = secretInput.value;
    let allMet = true;

    Object.values(criteria).forEach(({ el, test }) => {
      const met = test(secret);
      if (!met) allMet = false;
      el.classList.toggle('text-ef-faint', !met);
      el.classList.toggle('text-ef-accent', met);
      el.querySelector('svg').classList.toggle('opacity-0', !met);
      el.querySelector('svg').classList.toggle('opacity-100', met);
    });

    const emailOk = emailInput.value.trim().length > 0 && validateEmail(emailInput.value);
    submitBtn.disabled = !(allMet && emailOk);
  }

  emailInput.addEventListener('input', () => {
    emailError.classList.add('hidden');
    emailInput.style.borderColor = '';
    updateState();
  });
  emailInput.addEventListener('blur', () => {
    if (emailInput.value.trim() && !validateEmail(emailInput.value)) {
      emailError.classList.remove('hidden');
      emailInput.style.borderColor = '#e67e80';
    }
  });

  secretInput.addEventListener('input', updateState);

  toggleBtn.addEventListener('click', () => {
    const hidden = secretInput.type === 'password';
    secretInput.type = hidden ? 'text' : 'password';
    document.getElementById('eyeIcon').classList.toggle('hidden', hidden);
    document.getElementById('eyeOffIcon').classList.toggle('hidden', !hidden);
    toggleBtn.setAttribute('aria-label', hidden ? 'Masquer le secret' : 'Afficher le secret');
  });

  document.getElementById('signupForm').addEventListener('submit', e => {
    e.preventDefault();
    // À connecter : POST /inscription
  });
</script>

</body>
</html>
