<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* === Everforest Dark Soft — design tokens === */
    --bg: #2d353b;
    --bg-elevated: #343f44;
    --bg-elevated-2: #3d484d;
    --border: #475258;

    --fg: #d3c6aa;
    --fg-dim: #9da9a0;
    --fg-faint: #7a8478;

    --accent: #a7c080;
    --accent-glow: rgba(167, 192, 128, 0.18);

    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient glow behind the number — signature element */
  body::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 900px; height: 900px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
  }

  .stage {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.05s;
  }
  .eyebrow::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .amount {
    font-family: var(--font-mono);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    font-size: clamp(48px, 11vw, 96px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--fg);
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.15s;
  }

  .amount .currency {
    font-size: 0.45em;
    color: var(--accent);
    font-weight: 500;
    margin-left: 2px;
  }

  .amount .decimals {
    color: var(--fg-dim);
  }

  .as-of {
    margin-top: 22px;
    font-size: 13.5px;
    color: var(--fg-faint);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.3s;
  }

  .as-of strong {
    color: var(--fg-dim);
    font-weight: 500;
  }

  .ops-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 28px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    padding: 9px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    transition: background 0.15s ease, border-color 0.15s ease;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.5s;
  }
  .ops-link:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
  }
  .ops-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .ops-link svg { transition: transform 0.15s ease; }
  .ops-link:hover svg { transform: translateX(2px); }

  /* Forecast cards */
  .forecasts {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.36s;
  }

  .forecast-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    min-width: 152px;
    text-align: left;
  }

  .forecast-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--fg-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .forecast-label svg { flex-shrink: 0; opacity: 0.7; }

  .forecast-amount {
    font-family: var(--font-mono);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    font-size: 19px;
    color: var(--fg);
    letter-spacing: -0.01em;
  }
  .forecast-amount .decimals { color: var(--fg-faint); font-size: 0.8em; }

  .forecast-delta {
    margin-top: 4px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 500;
  }
  .forecast-delta.positive { color: var(--accent); }
  .forecast-delta.negative { color: #e67e80; }

  @media (max-width: 420px) {
    .forecasts { flex-direction: column; align-items: center; }
    .forecast-card { width: 100%; max-width: 240px; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
    .eyebrow, .amount, .as-of, .forecasts, .ops-link {
      animation: none;
      opacity: 1;
    }
  }

  @media (max-width: 480px) {
    .amount { gap: 2px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="eyebrow">Solde total</div>
  <div class="amount" aria-label="Solde total : 12 847,30 euros">
    <span>12&nbsp;847</span><span class="decimals">,30</span><span class="currency">€</span>
  </div>
  <p class="as-of">Calculé à partir de <strong>248 opérations</strong> · au 19 juin 2026</p>

  <div class="forecasts">
    <div class="forecast-card">
      <div class="forecast-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Fin de mois
      </div>
      <div class="forecast-amount"><span>13&nbsp;102</span><span class="decimals">,18</span> €</div>
      <div class="forecast-delta positive">+254,88 € attendus</div>
    </div>

    <div class="forecast-card">
      <div class="forecast-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
        </svg>
        Fin d'année
      </div>
      <div class="forecast-amount"><span>9&nbsp;430</span><span class="decimals">,52</span> €</div>
      <div class="forecast-delta negative">−3 416,78 € attendus</div>
    </div>
  </div>

  <a href="operations.html" class="ops-link">
    Voir les opérations
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>
</div>

</body>
</html>
