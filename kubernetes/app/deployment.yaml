apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance
  namespace: finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance
  template:
    metadata:
      labels:
        app: finance
    spec:
      containers:
        - name: finance
          image: ghcr.io/noynto/finance:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: finance
            - secretRef:
                name: finance
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10